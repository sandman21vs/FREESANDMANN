services:
  bastion:
    image: ghcr.io/sandman21vs/bastion:latest
    ports:
      - "4040:8000"
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
    environment:
      - SECRET_KEY=${APP_SEED:-change-me-in-production}
      - DATABASE_PATH=/app/data/freesandmann.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-FREE}
    restart: unless-stopped
