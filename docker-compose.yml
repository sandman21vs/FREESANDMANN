services:
  bastion:
    build: .
    ports:
      - "4040:8000"
    volumes:
      - bastion_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_PATH=/app/data/freesandmann.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-FREE}
    restart: unless-stopped

volumes:
  bastion_data:
    name: freesandmann_data
