{% macro article_form_fields(article, show_publish_mode=false, show_pinned=false) %}
<input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

<label>Title
    <input type="text" name="title" value="{{ article.title if article else '' }}" required>
</label>

<label>Body (Markdown)
    <textarea name="body_md" rows="20" placeholder="Write in Markdown. YouTube and Twitter/X URLs are auto-embedded.">{{ article.body_md if article else '' }}</textarea>
</label>

{% if show_publish_mode %}
<fieldset>
    <legend>{{ t('publish_mode_label') }}</legend>
    <label>
        <input type="radio" name="publish_mode" value="review" checked>
        {{ t('submit_for_review') }}
    </label>
    <label>
        <input type="radio" name="publish_mode" value="override">
        {{ t('publish_override') }}
    </label>
</fieldset>
{% endif %}

{% if show_pinned %}
<label>
    <input type="checkbox" name="pinned" {% if article and article.pinned %}checked{% endif %}>
    Pinned (show on homepage)
</label>
{% endif %}

<details>
    <summary>English Translation (optional)</summary>
    <label>Title (EN)
        <input type="text" name="title_en" value="{{ article.title_en if article else '' }}">
    </label>
    <label>Content (EN — Markdown)
        <textarea name="body_md_en" rows="12" placeholder="Write in Markdown.">{{ article.body_md_en if article else '' }}</textarea>
    </label>
</details>

<details>
    <summary>Deutsche Übersetzung (optional)</summary>
    <label>Titel (DE)
        <input type="text" name="title_de" value="{{ article.title_de if article else '' }}">
    </label>
    <label>Inhalt (DE — Markdown)
        <textarea name="body_md_de" rows="12" placeholder="Schreiben Sie auf Markdown.">{{ article.body_md_de if article else '' }}</textarea>
    </label>
</details>

<button type="submit">{{ 'Update' if article else 'Create' }} Article</button>
{% endmacro %}
