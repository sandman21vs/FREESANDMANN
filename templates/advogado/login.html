{% extends "base.html" %}

{% block title %}{{ t('lawyer_login_title') }} &mdash; {{ cfg.get('site_title', 'Bastion') }}{% endblock %}

{% block content %}
<h1>{{ t('lawyer_login_title') }}</h1>
<form method="POST" action="{{ url_for('lawyer_login') }}">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <label for="username">{{ t('lawyer_username') }}
        <input type="text" id="username" name="username" placeholder="{{ t('lawyer_username') }}" required autofocus>
    </label>
    <label for="password">Password
        <input type="password" id="password" name="password" placeholder="Password" required>
    </label>
    <button type="submit">Login</button>
</form>
{% endblock %}
